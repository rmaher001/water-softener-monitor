# ESPHome Water Softener Salt Monitor - v2.1.0
# GitHub: https://github.com/rmaher001/water-softener-monitor
#
# Distance-based monitoring with step-based regeneration detection
# Detects permanent distance increases after regeneration cycles (salt consumption)
# All advanced analytics handled in Home Assistant

esp32:
  board: m5stack-atoms3
  variant: esp32s3
  framework:
    type: esp-idf

# Preferences with debounced flash writes
preferences:
  flash_write_interval: 5s

# WiFi configuration moved to individual config files
captive_portal:

# Enable Improv via Serial for web installer WiFi configuration
improv_serial:

# Short BLE advertising name so the Improv service UUID fits in the 31-byte
# ADV packet. Without this, device name "water-softener-monitor-<mac>" (~29 bytes)
# pushes the Improv UUID out of the broadcast and discovery apps can't find it.
esp32_ble:
  name: "WS-Setup"

# Enable BLE Improv for wireless WiFi configuration
esp32_improv:
  authorizer: none

# Enable logging
logger:
  baud_rate: 115200
  deassert_rts_dtr: true  # Required for ESP32-S3 USB CDC compatibility

# Web server for standalone configuration
web_server:
  port: 80
  version: 3

# I2C for the ToF sensor (ATOM S3 Lite Grove port)
i2c:
  sda: GPIO2
  scl: GPIO1
  scan: true

# Status LED (SK6812 RGB on GPIO35)
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    rgb_order: GRB
    pin: GPIO35
    num_leds: 1
    chipset: SK6812
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1.5s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 100%

# Global variables
globals:
  - id: last_valid_status
    type: std::string
    restore_value: yes
    initial_value: '"Checking..."'

  # Step-based regeneration detection
  - id: step_baseline
    type: float
    restore_value: yes
    initial_value: '0.0'

  - id: step_state
    type: int
    restore_value: yes
    initial_value: '0'

  # Samples accumulated during CONFIRMING (v2.1.0: per-reading accumulator,
  # not hourly ticks). Reboots pause the window — both counters survive.
  - id: confirm_above_count
    type: int
    restore_value: yes
    initial_value: '0'

  - id: confirm_sample_count
    type: int
    restore_value: yes
    initial_value: '0'

  # Hours since last regeneration (incremented hourly, survives reboots)
  - id: hours_since_regen
    type: int
    restore_value: yes
    initial_value: '9999'

# Configurable settings
number:
  - platform: template
    name: "Tank Height"
    id: tank_height_cm
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 100
    min_value: 30
    max_value: 150
    step: 1
    unit_of_measurement: "cm"
    icon: "mdi:arrow-expand-vertical"
    mode: box

  - platform: template
    name: "Refill Threshold Distance"
    id: refill_threshold_cm
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 43
    min_value: 10
    max_value: 120
    step: 1
    unit_of_measurement: "cm"
    icon: "mdi:arrow-expand-down"
    mode: box

  - platform: template
    name: "Update Interval"
    id: update_interval_seconds
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 30
    max_value: 300
    step: 30
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    mode: box

  - platform: template
    name: "Regen Step Threshold"
    id: regen_step_threshold
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 2.0
    min_value: 1.0
    max_value: 10.0
    step: 0.5
    unit_of_measurement: "cm"
    icon: "mdi:stairs"
    mode: box

  - platform: template
    name: "Regen Confirmation Hours"
    id: regen_confirmation_hours
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 6
    min_value: 1
    max_value: 24
    step: 1
    unit_of_measurement: "h"
    icon: "mdi:timer-check-outline"
    mode: box

  - platform: template
    name: "Regen Confirm Percent"
    id: regen_confirm_percent
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 75
    min_value: 50
    max_value: 95
    step: 5
    unit_of_measurement: "%"
    icon: "mdi:percent"
    mode: box

  - platform: template
    name: "Regen Overdue Days"
    id: regen_overdue_days
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 20
    min_value: 5
    max_value: 30
    step: 1
    unit_of_measurement: "days"
    icon: "mdi:calendar-alert"
    mode: box

# Switches
switch:
  - platform: template
    name: "Fast Polling Mode"
    id: fast_polling_mode
    icon: "mdi:speedometer"
    optimistic: true
    on_turn_on:
      - delay: 300s  # Auto-disable after 5 minutes
      - switch.turn_off: fast_polling_mode
    on_turn_off:
      - lambda: |-
          ESP_LOGI("config", "Fast polling disabled");

# Buttons
button:
  - platform: template
    name: "Set Default Thresholds"
    id: set_default_thresholds
    icon: "mdi:auto-fix"
    on_press:
      - lambda: |-
          float tank_height = id(tank_height_cm).state;
          float new_threshold = tank_height * 0.43;
          id(refill_threshold_cm).publish_state(new_threshold);
          ESP_LOGI("config", "Default thresholds set: threshold=%.1fcm (43%% of %.0fcm tank height)", new_threshold, tank_height);

  - platform: template
    name: "Mark Regeneration Now"
    id: mark_regen_now
    icon: "mdi:water-sync"
    on_press:
      - lambda: |-
          id(hours_since_regen) = 0;
          id(step_baseline) = id(salt_distance_raw).state;
          id(step_state) = 0;
          id(confirm_above_count) = 0;
          id(confirm_sample_count) = 0;
          id(regen_overdue).publish_state(false);
          id(last_regen_sensor).publish_state(0.0);
          ESP_LOGI("step", "Manual regen mark: baseline=%.1f cm", id(step_baseline));

  - platform: restart
    name: "Restart"
    icon: "mdi:restart"

# VL53L0X Distance Sensor
sensor:
  - platform: vl53l0x
    name: "Distance to Salt"
    id: salt_distance_raw
    address: 0x29
    update_interval: never  # Controlled by interval component
    long_range: true
    unit_of_measurement: "cm"
    accuracy_decimals: 1
    filters:
      - multiply: 100  # Convert meters to cm
      - filter_out: nan
      - clamp:
          min_value: 5.0
          max_value: 120.0
          ignore_out_of_range: true
      - median:
          window_size: 3
          send_every: 1
    on_value:
      then:
        - component.update: salt_status_text
        - lambda: |-
            // Step-based regeneration detection (v2.1.0: sample-count confirmation)
            // Confirmation runs per-reading: accumulate samples during the window,
            // early-exit when the required fraction of samples above threshold is hit,
            // discard at end-of-window if never hit. No abandon check — false starts
            // simply dilute the above-count and expire naturally.
            float distance = id(salt_distance_raw).state;
            if (isnan(distance)) return;

            float baseline = id(step_baseline);
            float step_thresh = id(regen_step_threshold).state;

            const float REFILL_DROP_CM = 10.0;
            const float EMA_ALPHA = 0.05;
            const float NOISE_BAND_CM = 1.5;
            const int   CREDIT_MIN_SAMPLES = 15;  // min evidence to credit regen on refill interrupt

            // === INITIALIZE BASELINE ON FIRST VALID READING ===
            if (baseline <= 0.0) {
              id(step_baseline) = distance;
              ESP_LOGI("step", "Baseline initialized to %.1f cm", distance);
              return;
            }

            // === SALT REFILL DETECTION (large drop) ===
            if (distance < baseline - REFILL_DROP_CM) {
              // If refill interrupts a CONFIRMING window with enough *affirmative*
              // evidence, credit the pending regen before resetting state.
              // Requires both: minimum samples collected AND at least half of them
              // actually above threshold (so noise-borderline windows don't credit).
              if (id(step_state) == 1
                  && id(confirm_sample_count) >= CREDIT_MIN_SAMPLES
                  && id(confirm_above_count) >= CREDIT_MIN_SAMPLES / 2) {
                id(hours_since_regen) = 0;
                id(regen_overdue).publish_state(false);
                id(last_regen_sensor).publish_state(0.0);
                ESP_LOGI("step", "Refill during CONFIRMING — crediting pending regen (samples=%d, above=%d)",
                         id(confirm_sample_count), id(confirm_above_count));
              }
              ESP_LOGI("step", "Salt refill detected: %.1f -> %.1f cm (drop %.1f)",
                       baseline, distance, baseline - distance);
              id(step_baseline) = distance;
              id(step_state) = 0;
              id(confirm_above_count) = 0;
              id(confirm_sample_count) = 0;
              return;
            }

            // === STATE MACHINE ===
            if (id(step_state) == 0) {
              // MONITORING state: update EMA baseline for readings within noise band
              if (fabs(distance - baseline) < NOISE_BAND_CM) {
                id(step_baseline) = EMA_ALPHA * distance + (1.0 - EMA_ALPHA) * baseline;
              }

              // Check for step increase -> enter CONFIRMING
              if (distance > baseline + step_thresh) {
                id(step_state) = 1;
                id(confirm_above_count) = 0;
                id(confirm_sample_count) = 0;
                ESP_LOGI("step", "Potential step: %.1f cm (baseline %.1f + thresh %.1f = %.1f)",
                         distance, baseline, step_thresh, baseline + step_thresh);
              }

            } else if (id(step_state) == 1) {
              // CONFIRMING state: accumulate sample counts; decide per-reading.
              id(confirm_sample_count) = id(confirm_sample_count) + 1;
              if (distance > baseline + step_thresh) {
                id(confirm_above_count) = id(confirm_above_count) + 1;
              }

              int target_hours = (int)id(regen_confirmation_hours).state;
              int update_sec = (int)id(update_interval_seconds).state;
              if (update_sec < 1) update_sec = 60;  // guard against zero
              int window_samples = (target_hours * 3600) / update_sec;
              if (window_samples < 1) window_samples = 1;
              int required = (window_samples * (int)id(regen_confirm_percent).state) / 100;
              if (required < 1) required = 1;

              // Early confirm: hit the required count before window expires.
              if (id(confirm_above_count) >= required) {
                ESP_LOGI("step", "Regen confirmed! %d/%d samples above threshold after %d samples (window=%d, %d%%). "
                                  "Baseline %.1f -> %.1f cm",
                         id(confirm_above_count), required, id(confirm_sample_count),
                         window_samples, (int)id(regen_confirm_percent).state,
                         baseline, distance);
                id(step_baseline) = distance;
                id(hours_since_regen) = 0;
                id(step_state) = 0;
                id(confirm_above_count) = 0;
                id(confirm_sample_count) = 0;
                id(regen_overdue).publish_state(false);
                id(last_regen_sensor).publish_state(0.0);
                return;
              }

              // Window expired without reaching required count -> discard
              if (id(confirm_sample_count) >= window_samples) {
                ESP_LOGI("step", "Regen NOT confirmed: %d/%d samples above threshold in full window (required %d). Discarding.",
                         id(confirm_above_count), id(confirm_sample_count), required);
                id(step_state) = 0;
                id(confirm_above_count) = 0;
                id(confirm_sample_count) = 0;
              }
            }

  # WiFi signal strength
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    icon: "mdi:wifi"

  # Days since last detected regeneration
  - platform: template
    name: "Last Regeneration"
    id: last_regen_sensor
    icon: "mdi:water-sync"
    unit_of_measurement: "days"
    accuracy_decimals: 1
    update_interval: 3600s
    lambda: |-
      if (id(hours_since_regen) >= 9999) {
        return NAN;  // Never detected
      }
      return id(hours_since_regen) / 24.0;

# Binary sensors
binary_sensor:
  - platform: template
    name: "Sensor Out of Range"
    id: sensor_out_of_range
    icon: "mdi:alert-circle"
    lambda: |-
      const float SENSOR_MIN_RANGE = 5.0;   // cm
      const float SENSOR_MAX_RANGE = 120.0; // cm
      float current_distance = id(salt_distance_raw).state;

      if (isnan(current_distance)) {
        return true;
      } else if (current_distance < SENSOR_MIN_RANGE || current_distance > SENSOR_MAX_RANGE) {
        return true;
      }
      return false;

  - platform: template
    name: "Regeneration Overdue"
    id: regen_overdue
    icon: "mdi:calendar-alert"
    device_class: problem
    lambda: |-
      if (id(hours_since_regen) >= 9999) {
        return false;  // Never detected yet, not overdue
      }
      int overdue_hours = (int)(id(regen_overdue_days).state * 24);
      return id(hours_since_regen) >= overdue_hours;

# Status text
text_sensor:
  - platform: template
    name: "Salt Status"
    id: salt_status_text
    icon: "mdi:information-variant"
    update_interval: never
    lambda: |-
      // Status hysteresis configuration
      const float STATUS_HYSTERESIS_CM = 2.0;  // Dead zone to prevent status bouncing

      float distance = id(salt_distance_raw).state;
      float threshold = id(refill_threshold_cm).state;

      std::string new_status;
      std::string current_status = id(last_valid_status);

      if (isnan(distance)) {
        new_status = "Checking...";
      } else {
        // First boot: Initialize status directly without hysteresis
        if (current_status == "Checking...") {
          new_status = (distance >= threshold) ? "Refill" : "Good";
        }
        // Apply hysteresis based on current status
        else if (current_status == "Good") {
          // Need to exceed threshold + hysteresis to change to Refill
          if (distance >= (threshold + STATUS_HYSTERESIS_CM)) {
            new_status = "Refill";
          } else {
            new_status = "Good";
          }
        } else {
          // Currently "Refill" - need to drop below threshold - hysteresis for Good
          if (distance < (threshold - STATUS_HYSTERESIS_CM)) {
            new_status = "Good";
          } else {
            new_status = "Refill";
          }
        }
      }

      // Log status changes and update LED
      if (new_status != current_status) {
        ESP_LOGI("status", "Status change: %s -> %s", current_status.c_str(), new_status.c_str());

        // Update status LED based on new status
        if (new_status == "Refill") {
          // Slow pulsing red for refill needed
          auto call = id(status_led).turn_on();
          call.set_rgb(1.0, 0.0, 0.0);  // Red
          call.set_brightness(0.5);      // 50% max brightness
          call.set_effect("Slow Pulse");
          call.perform();
        } else if (new_status == "Good") {
          // Solid green for good status
          auto call = id(status_led).turn_on();
          call.set_rgb(0.0, 1.0, 0.0);  // Green
          call.set_brightness(0.35);     // 35% brightness
          call.set_effect("None");
          call.perform();
        } else {
          // Turn off for checking/unknown status
          auto call = id(status_led).turn_off();
          call.perform();
        }
      }

      id(last_valid_status) = new_status;
      return {new_status};

  - platform: template
    name: "Firmware Version"
    id: firmware_version
    icon: "mdi:chip"
    update_interval: never
    lambda: |-
      return {"${version}"};

# Update intervals
interval:
  # Fast polling for setup/calibration
  - interval: 100ms
    then:
      - if:
          condition:
            switch.is_on: fast_polling_mode
          then:
            - component.update: salt_distance_raw

  # Hourly tick: increments the days-since-regen counter and publishes
  # overdue state. Confirmation progress is now per-reading (not hourly),
  # so this interval no longer participates in the detection state machine.
  - interval: 3600s
    then:
      - lambda: |-
          if (id(hours_since_regen) < 9999) {
            id(hours_since_regen) = id(hours_since_regen) + 1;
            int overdue_hours = (int)(id(regen_overdue_days).state * 24);

            if (id(hours_since_regen) >= overdue_hours) {
              id(regen_overdue).publish_state(true);
              ESP_LOGW("step", "Regeneration overdue! %d hours since last detected step", id(hours_since_regen));
            }
          }

  # Normal update interval
  - interval: 1s
    then:
      - lambda: |-
          static unsigned long last_update = 0;
          unsigned long current_time = millis() / 1000;
          unsigned long interval_sec = (unsigned long)id(update_interval_seconds).state;

          if (!id(fast_polling_mode).state && (current_time - last_update >= interval_sec)) {
            last_update = current_time;
            id(salt_distance_raw).update();
          }

# On boot - take immediate reading, set firmware version, and initialize LED
esphome:
  on_boot:
    priority: -100  # After other components initialized
    then:
      - delay: 2s  # Wait for sensor to stabilize
      - component.update: salt_distance_raw
      - component.update: firmware_version
      - delay: 500ms  # Wait for status to be computed
      - lambda: |-
          ESP_LOGI("step", "Boot: baseline=%.1f cm, hours_since_regen=%d, state=%d, confirm_above=%d, confirm_samples=%d",
                   id(step_baseline), id(hours_since_regen), id(step_state),
                   id(confirm_above_count), id(confirm_sample_count));
          // Initialize LED based on current status
          std::string status = id(last_valid_status);
          if (status == "Refill") {
            auto call = id(status_led).turn_on();
            call.set_rgb(1.0, 0.0, 0.0);
            call.set_brightness(0.5);
            call.set_effect("Slow Pulse");
            call.perform();
          } else if (status == "Good") {
            auto call = id(status_led).turn_on();
            call.set_rgb(0.0, 1.0, 0.0);
            call.set_brightness(0.35);
            call.set_effect("None");
            call.perform();
          }
