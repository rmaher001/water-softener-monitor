# ESPHome Water Softener Salt Monitor - v3.0.0
# GitHub: https://github.com/rmaher001/water-softener-monitor
#
# Two-window comparison regeneration detection.
# Compares median of recent 30-sample window against median of 30-sample window
# from `regen_confirmation_hours` ago. If delta >= regen_step_threshold,
# a regeneration step is confirmed.
# All advanced analytics handled in Home Assistant

esp32:
  board: m5stack-atoms3
  variant: esp32s3
  framework:
    type: esp-idf

# Preferences with debounced flash writes
preferences:
  flash_write_interval: 5s

# WiFi configuration moved to individual config files
captive_portal:

# Enable Improv via Serial for web installer WiFi configuration
improv_serial:

# Short BLE advertising name so the Improv service UUID fits in the 31-byte
# ADV packet. Without this, device name "water-softener-monitor-<mac>" (~29 bytes)
# pushes the Improv UUID out of the broadcast and discovery apps can't find it.
esp32_ble:
  name: "WS-Setup"

# Enable BLE Improv for wireless WiFi configuration
esp32_improv:
  authorizer: none

# Enable logging
logger:
  baud_rate: 115200
  deassert_rts_dtr: true  # Required for ESP32-S3 USB CDC compatibility

# Web server for standalone configuration
web_server:
  port: 80
  version: 3

# I2C for the ToF sensor (ATOM S3 Lite Grove port)
i2c:
  sda: GPIO2
  scl: GPIO1
  scan: true

# Status LED (SK6812 RGB on GPIO35)
light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    rgb_order: GRB
    pin: GPIO35
    num_leds: 1
    chipset: SK6812
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 1.5s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 100%

# Global variables
globals:
  - id: last_valid_status
    type: std::string
    restore_value: yes
    initial_value: '"Checking..."'

  # Hours since last regeneration (incremented hourly, survives reboots)
  - id: hours_since_regen
    type: int
    restore_value: yes
    initial_value: '9999'

  # Ring buffer of recent distance readings in 0.1 cm units (RAM-only).
  # Sized to handle 24h lookback @ 30s interval (2880) + 30 recent + 30 old + slack.
  - id: dist_buffer
    type: std::vector<int16_t>
    restore_value: no
    initial_value: ''

  - id: dist_buffer_head
    type: int
    restore_value: no
    initial_value: '0'

  - id: dist_buffer_count
    type: int
    restore_value: no
    initial_value: '0'

  # Cooldown counter (samples remaining until next detection allowed).
  # Set after a confirmed regen so the same step can't re-trigger as the
  # old window shifts past it. RAM-only — a reboot resets cooldown to 0.
  - id: cooldown_samples
    type: int
    restore_value: no
    initial_value: '0'

# Configurable settings
number:
  - platform: template
    name: "Tank Height"
    id: tank_height_cm
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 100
    min_value: 30
    max_value: 150
    step: 1
    unit_of_measurement: "cm"
    icon: "mdi:arrow-expand-vertical"
    mode: box

  - platform: template
    name: "Refill Threshold Distance"
    id: refill_threshold_cm
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 43
    min_value: 10
    max_value: 120
    step: 1
    unit_of_measurement: "cm"
    icon: "mdi:arrow-expand-down"
    mode: box

  - platform: template
    name: "Update Interval"
    id: update_interval_seconds
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 60
    min_value: 30
    max_value: 300
    step: 30
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    mode: box

  - platform: template
    name: "Regen Step Threshold"
    id: regen_step_threshold
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 2.0
    min_value: 1.0
    max_value: 10.0
    step: 0.5
    unit_of_measurement: "cm"
    icon: "mdi:stairs"
    mode: box

  - platform: template
    name: "Regen Confirmation Hours"
    id: regen_confirmation_hours
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 6
    min_value: 1
    max_value: 24
    step: 1
    unit_of_measurement: "h"
    icon: "mdi:timer-check-outline"
    mode: box

  - platform: template
    name: "Regen Confirm Percent"
    id: regen_confirm_percent
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 75
    min_value: 50
    max_value: 95
    step: 5
    unit_of_measurement: "%"
    icon: "mdi:percent"
    mode: box

  - platform: template
    name: "Regen Overdue Days"
    id: regen_overdue_days
    entity_category: "config"
    optimistic: true
    restore_value: true
    initial_value: 20
    min_value: 5
    max_value: 30
    step: 1
    unit_of_measurement: "days"
    icon: "mdi:calendar-alert"
    mode: box

# Switches
switch:
  - platform: template
    name: "Fast Polling Mode"
    id: fast_polling_mode
    icon: "mdi:speedometer"
    optimistic: true
    on_turn_on:
      - delay: 300s  # Auto-disable after 5 minutes
      - switch.turn_off: fast_polling_mode
    on_turn_off:
      - lambda: |-
          ESP_LOGI("config", "Fast polling disabled");

# Buttons
button:
  - platform: template
    name: "Set Default Thresholds"
    id: set_default_thresholds
    icon: "mdi:auto-fix"
    on_press:
      - lambda: |-
          float tank_height = id(tank_height_cm).state;
          float new_threshold = tank_height * 0.43;
          id(refill_threshold_cm).publish_state(new_threshold);
          ESP_LOGI("config", "Default thresholds set: threshold=%.1fcm (43%% of %.0fcm tank height)", new_threshold, tank_height);

  - platform: template
    name: "Mark Regeneration Now"
    id: mark_regen_now
    icon: "mdi:water-sync"
    on_press:
      - lambda: |-
          // Suppress auto-detection from re-firing on the same step the user
          // is acknowledging. Cooldown matches the auto-detection cooldown so
          // any pending step has time to roll out of the old window.
          int update_sec = (int)id(update_interval_seconds).state;
          if (update_sec < 1) update_sec = 60;
          int lookback_hours = (int)id(regen_confirmation_hours).state;
          int lookback_offset = (lookback_hours * 3600) / update_sec;
          id(cooldown_samples) = lookback_offset + 30;  // 30 = RECENT_WINDOW
          id(hours_since_regen) = 0;
          id(regen_overdue).publish_state(false);
          id(last_regen_sensor).publish_state(0.0);
          ESP_LOGI("regen", "Manual regen mark (cooldown %d samples)", id(cooldown_samples));

  - platform: restart
    name: "Restart"
    icon: "mdi:restart"

# VL53L0X Distance Sensor
sensor:
  - platform: vl53l0x
    name: "Distance to Salt"
    id: salt_distance_raw
    address: 0x29
    update_interval: never  # Controlled by interval component
    long_range: true
    unit_of_measurement: "cm"
    accuracy_decimals: 1
    filters:
      - multiply: 100  # Convert meters to cm
      - filter_out: nan
      - clamp:
          min_value: 5.0
          max_value: 120.0
          ignore_out_of_range: true
      - median:
          window_size: 3
          send_every: 1
    on_value:
      then:
        - component.update: salt_status_text
        - lambda: |-
            // Two-window comparison regen detection (v3.0.0).
            // Median of last RECENT_WINDOW samples vs median of OLD_WINDOW samples
            // taken `regen_confirmation_hours` ago. If delta >= regen_step_threshold,
            // a regen step is confirmed.
            static const int RECENT_WINDOW = 30;
            static const int OLD_WINDOW = 30;
            static const int MAX_BUFFER = 3000;  // 24h @ 30s + slack

            float distance = id(salt_distance_raw).state;
            if (isnan(distance)) return;

            // Lazy-initialize the ring buffer to MAX_BUFFER capacity
            if (id(dist_buffer).empty()) {
              id(dist_buffer).resize(MAX_BUFFER, 0);
              id(dist_buffer_head) = 0;
              id(dist_buffer_count) = 0;
              ESP_LOGI("regen", "Distance buffer initialized (capacity %d samples)", MAX_BUFFER);
            }

            // Append current reading (0.1 cm units) to ring buffer
            int16_t d_units = (int16_t)roundf(distance * 10.0f);
            id(dist_buffer)[id(dist_buffer_head)] = d_units;
            id(dist_buffer_head) = (id(dist_buffer_head) + 1) % MAX_BUFFER;
            if (id(dist_buffer_count) < MAX_BUFFER) {
              id(dist_buffer_count) = id(dist_buffer_count) + 1;
            }

            // Cooldown after a confirmed regen prevents the same step from
            // re-triggering as the old window shifts past it.
            if (id(cooldown_samples) > 0) {
              id(cooldown_samples) = id(cooldown_samples) - 1;
              return;
            }

            // Compute lookback offset in samples
            int update_sec = (int)id(update_interval_seconds).state;
            if (update_sec < 1) update_sec = 60;
            int lookback_hours = (int)id(regen_confirmation_hours).state;
            int lookback_offset = (lookback_hours * 3600) / update_sec;

            // Cap lookback_offset so we never index past the buffer (defense in
            // depth — UI min interval is 30s which keeps offset within bounds).
            int max_offset = MAX_BUFFER - RECENT_WINDOW - OLD_WINDOW;
            if (lookback_offset > max_offset) lookback_offset = max_offset;
            if (lookback_offset < 1) lookback_offset = 1;

            int needed = RECENT_WINDOW + lookback_offset + OLD_WINDOW;
            if (id(dist_buffer_count) < needed) return;

            int head = id(dist_buffer_head);

            // Recent window: most recent RECENT_WINDOW samples
            std::vector<int16_t> recent;
            recent.reserve(RECENT_WINDOW);
            for (int i = 0; i < RECENT_WINDOW; i++) {
              int idx = (head - 1 - i + MAX_BUFFER) % MAX_BUFFER;
              recent.push_back(id(dist_buffer)[idx]);
            }

            // Old window: OLD_WINDOW samples ending lookback_offset positions ago
            std::vector<int16_t> old_window;
            old_window.reserve(OLD_WINDOW);
            for (int i = 0; i < OLD_WINDOW; i++) {
              int idx = (head - 1 - lookback_offset - i + MAX_BUFFER) % MAX_BUFFER;
              old_window.push_back(id(dist_buffer)[idx]);
            }

            // Median of the old window (sort is destructive; recent stays unsorted
            // for the above-count pass below)
            // Lower median for even-N (canonical choice; reviewer flagged
            // upper-median bias as off-by-one).
            std::sort(old_window.begin(), old_window.end());
            int16_t old_med = old_window[(OLD_WINDOW - 1) / 2];

            float step_thresh = id(regen_step_threshold).state;
            int16_t step_thresh_units = (int16_t)roundf(step_thresh * 10.0f);
            int16_t above_threshold_units = old_med + step_thresh_units;

            // Count of recent samples individually above (old_med + threshold)
            // — guards against firing while the recent window is mid-transition.
            int above_count = 0;
            for (int16_t v : recent) {
              if (v > above_threshold_units) above_count++;
            }

            std::sort(recent.begin(), recent.end());
            int16_t recent_med = recent[(RECENT_WINDOW - 1) / 2];

            float recent_med_cm = recent_med / 10.0f;
            float old_med_cm = old_med / 10.0f;
            float delta_cm = recent_med_cm - old_med_cm;

            int confirm_pct = (int)id(regen_confirm_percent).state;
            int required_above = (RECENT_WINDOW * confirm_pct) / 100;
            if (required_above < 1) required_above = 1;

            ESP_LOGD("regen", "Compare recent_med=%.1f old_med=%.1f delta=%.1f thresh=%.1f above=%d/%d (need %d, %d%%)",
                     recent_med_cm, old_med_cm, delta_cm, step_thresh,
                     above_count, RECENT_WINDOW, required_above, confirm_pct);

            if (delta_cm >= step_thresh && above_count >= required_above) {
              ESP_LOGI("regen", "Regen confirmed! recent_med=%.1f old_med=%.1f delta=%.1f cm "
                                "(lookback %dh, threshold %.1f cm, above %d/%d)",
                       recent_med_cm, old_med_cm, delta_cm, lookback_hours, step_thresh,
                       above_count, RECENT_WINDOW);
              id(hours_since_regen) = 0;
              id(last_regen_sensor).publish_state(0.0);
              id(regen_overdue).publish_state(false);
              id(cooldown_samples) = lookback_offset + RECENT_WINDOW;
            }

  # WiFi signal strength
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
    icon: "mdi:wifi"

  # Days since last detected regeneration
  - platform: template
    name: "Last Regeneration"
    id: last_regen_sensor
    icon: "mdi:water-sync"
    unit_of_measurement: "days"
    accuracy_decimals: 1
    update_interval: 3600s
    lambda: |-
      if (id(hours_since_regen) >= 9999) {
        return NAN;  // Never detected
      }
      return id(hours_since_regen) / 24.0;

# Binary sensors
binary_sensor:
  - platform: template
    name: "Sensor Out of Range"
    id: sensor_out_of_range
    icon: "mdi:alert-circle"
    lambda: |-
      const float SENSOR_MIN_RANGE = 5.0;   // cm
      const float SENSOR_MAX_RANGE = 120.0; // cm
      float current_distance = id(salt_distance_raw).state;

      if (isnan(current_distance)) {
        return true;
      } else if (current_distance < SENSOR_MIN_RANGE || current_distance > SENSOR_MAX_RANGE) {
        return true;
      }
      return false;

  - platform: template
    name: "Regeneration Overdue"
    id: regen_overdue
    icon: "mdi:calendar-alert"
    device_class: problem
    lambda: |-
      if (id(hours_since_regen) >= 9999) {
        return false;  // Never detected yet, not overdue
      }
      int overdue_hours = (int)(id(regen_overdue_days).state * 24);
      return id(hours_since_regen) >= overdue_hours;

# Status text
text_sensor:
  - platform: template
    name: "Salt Status"
    id: salt_status_text
    icon: "mdi:information-variant"
    update_interval: never
    lambda: |-
      // Status hysteresis configuration
      const float STATUS_HYSTERESIS_CM = 2.0;  // Dead zone to prevent status bouncing

      float distance = id(salt_distance_raw).state;
      float threshold = id(refill_threshold_cm).state;

      std::string new_status;
      std::string current_status = id(last_valid_status);

      if (isnan(distance)) {
        new_status = "Checking...";
      } else {
        // First boot: Initialize status directly without hysteresis
        if (current_status == "Checking...") {
          new_status = (distance >= threshold) ? "Refill" : "Good";
        }
        // Apply hysteresis based on current status
        else if (current_status == "Good") {
          // Need to exceed threshold + hysteresis to change to Refill
          if (distance >= (threshold + STATUS_HYSTERESIS_CM)) {
            new_status = "Refill";
          } else {
            new_status = "Good";
          }
        } else {
          // Currently "Refill" - need to drop below threshold - hysteresis for Good
          if (distance < (threshold - STATUS_HYSTERESIS_CM)) {
            new_status = "Good";
          } else {
            new_status = "Refill";
          }
        }
      }

      // Log status changes and update LED
      if (new_status != current_status) {
        ESP_LOGI("status", "Status change: %s -> %s", current_status.c_str(), new_status.c_str());

        // Update status LED based on new status
        if (new_status == "Refill") {
          // Slow pulsing red for refill needed
          auto call = id(status_led).turn_on();
          call.set_rgb(1.0, 0.0, 0.0);  // Red
          call.set_brightness(0.5);      // 50% max brightness
          call.set_effect("Slow Pulse");
          call.perform();
        } else if (new_status == "Good") {
          // Solid green for good status
          auto call = id(status_led).turn_on();
          call.set_rgb(0.0, 1.0, 0.0);  // Green
          call.set_brightness(0.35);     // 35% brightness
          call.set_effect("None");
          call.perform();
        } else {
          // Turn off for checking/unknown status
          auto call = id(status_led).turn_off();
          call.perform();
        }
      }

      id(last_valid_status) = new_status;
      return {new_status};

  - platform: template
    name: "Firmware Version"
    id: firmware_version
    icon: "mdi:chip"
    update_interval: never
    lambda: |-
      return {"${version}"};

# Update intervals
interval:
  # Fast polling for setup/calibration
  - interval: 100ms
    then:
      - if:
          condition:
            switch.is_on: fast_polling_mode
          then:
            - component.update: salt_distance_raw

  # Hourly tick: increments the days-since-regen counter and publishes
  # overdue state. Detection itself runs per-reading on the distance sensor.
  - interval: 3600s
    then:
      - lambda: |-
          if (id(hours_since_regen) < 9999) {
            id(hours_since_regen) = id(hours_since_regen) + 1;
            int overdue_hours = (int)(id(regen_overdue_days).state * 24);

            if (id(hours_since_regen) >= overdue_hours) {
              id(regen_overdue).publish_state(true);
              ESP_LOGW("regen", "Regeneration overdue! %d hours since last detected step", id(hours_since_regen));
            }
          }

  # Normal update interval
  - interval: 1s
    then:
      - lambda: |-
          static unsigned long last_update = 0;
          unsigned long current_time = millis() / 1000;
          unsigned long interval_sec = (unsigned long)id(update_interval_seconds).state;

          if (!id(fast_polling_mode).state && (current_time - last_update >= interval_sec)) {
            last_update = current_time;
            id(salt_distance_raw).update();
          }

# On boot - take immediate reading, set firmware version, and initialize LED
esphome:
  on_boot:
    priority: -100  # After other components initialized
    then:
      - delay: 2s  # Wait for sensor to stabilize
      - component.update: salt_distance_raw
      - component.update: firmware_version
      - delay: 500ms  # Wait for status to be computed
      - lambda: |-
          ESP_LOGI("regen", "Boot: hours_since_regen=%d (buffer empty, will warm up over ~2.5h)",
                   id(hours_since_regen));
          // Initialize LED based on current status
          std::string status = id(last_valid_status);
          if (status == "Refill") {
            auto call = id(status_led).turn_on();
            call.set_rgb(1.0, 0.0, 0.0);
            call.set_brightness(0.5);
            call.set_effect("Slow Pulse");
            call.perform();
          } else if (status == "Good") {
            auto call = id(status_led).turn_on();
            call.set_rgb(0.0, 1.0, 0.0);
            call.set_brightness(0.35);
            call.set_effect("None");
            call.perform();
          }
