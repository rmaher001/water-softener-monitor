# Water Softener Monitor - ATOM Lite Web Installer Config
# For M5Stack ATOM Lite hardware (ESP32-PICO-D4)
# Includes web server for standalone configuration (ESP-IDF framework)

substitutions:
  name: "water-softener-monitor"
  version: "2.1.0-lite"

esphome:
  name: "${name}"
  friendly_name: Water Softener Monitor
  comment: Water Softener Monitor (ATOM Lite)
  name_add_mac_suffix: true
  project:
    name: "rmaher001.water-softener-monitor"
    version: "${version}"

# Dashboard import for ESPHome Dashboard integration and updates
dashboard_import:
  package_import_url: github://rmaher001/water-softener-monitor/src/water-softener-lite-webinstall.yaml@latest
  import_full_config: false

# Include the Lite core package for all sensor/config logic
packages:
  water_softener: !include water-softener-lite-core.yaml

# API for Home Assistant integration
api:

# HTTP client component (required by update.http_request)
http_request:

# OTA updates
ota:
  - platform: esphome            # For ESPHome Dashboard OTA (unchanged)
  - platform: http_request       # For HA update-entity OTA (new in 2.0.2)

# Firmware update notifications — device polls our manifest on GitHub Pages,
# exposes an HA update entity that fires proper update notifications when a
# new version is published. Click "Install" in HA triggers OTA from the
# URL in the manifest.
update:
  - platform: http_request
    name: "Firmware Update"
    source: https://rmaher001.github.io/water-softener-monitor/manifest-lite.json
    update_interval: 6h

wifi:
  power_save_mode: none
  ap:
    ssid: "Water Softener Hotspot"
    password: "configme123"
    ap_timeout: 0s
